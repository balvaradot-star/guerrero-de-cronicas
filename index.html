<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crónicas | Batalla de Decisiones</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #0f172a; --neon: #22d3ee; --gold: #fbbf24; --border: #334155; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f1f5f9; padding: 10px; margin: 0; min-height: 100vh; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 400px; }
        .card { background: var(--card); border: 2px solid var(--neon); padding: 20px; border-radius: 16px; }
        h1, h2, h3 { font-family: 'Cinzel', serif; color: var(--neon); text-align: center; margin: 0 0 15px 0; }
        .nav-week { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 10px; border-radius: 8px; margin-bottom: 20px; }
        .nav-btn { background: none; border: 1px solid var(--neon); color: var(--neon); padding: 5px 15px; border-radius: 5px; cursor: pointer; font-weight:bold; }
        .mission { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; font-size: 0.95rem; }
        .k-item { background: #020617; border: 1px solid var(--border); padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; font-size: 0.85rem; }
        input[type="text"], input[type="password"], input[type="number"], select, textarea { width: 100%; padding: 12px; margin: 5px 0; background: #020617; border: 1px solid var(--border); color: white; border-radius: 8px; font-size: 16px; }
        textarea { height: 80px; resize: none; }
        .btn { width: 100%; padding: 14px; background: var(--neon); color: #020617; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; font-family: 'Cinzel'; text-transform: uppercase; }
        .w-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .w-block { border: 1px solid var(--border); border-radius: 8px; padding: 8px; display: flex; flex-direction: column; }
        .w-title { color: var(--neon); font-size: 0.75rem; font-weight: bold; margin-bottom: 5px; text-align: center; }
        .credits { text-align: center; font-size: 0.7rem; color: #475569; margin-top: 20px; font-family: 'Cinzel'; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="authScreen" class="app"><div class="card">
    <h1>CRÓNICAS: UNA BATALLA DE DECISIONES</h1>
    <input type="text" id="inName" placeholder="Tu nombre">
    <input type="password" id="inPass" placeholder="Clave secreta">
    <select id="role"><option value="guerrero">Rol: Guerrero</option><option value="rey">Rol: Rey</option></select>
    <button class="btn" onclick="initApp()">INICIAR GESTA</button>
</div></div>

<div id="mainApp" class="app hidden"><div class="card">
    <h2 id="uDisplay"></h2>
    <div class="nav-week">
        <button class="nav-btn" onclick="changeWeek(-1)">◀</button>
        <span id="weekLabel" style="font-weight:bold;">Semana 1</span>
        <button class="nav-btn" onclick="changeWeek(1)">▶</button>
    </div>

    <div id="tasks">
        <label class="mission"><input type="checkbox" id="t1" onchange="save()"> Leer Lección (5 pts)</label>
        <label class="mission"><input type="checkbox" id="t2" onchange="save()"> Oración (5 pts)</label>
        <label class="mission"><input type="checkbox" id="t3" onchange="save()"> Compartir Fe (5 pts)</label>
        <label class="mission"><input type="checkbox" id="t4" onchange="save()"> Aprender Verso (5 pts)</label>
    </div>

    <h3 style="margin-top:20px;">Reinos Conquistados</h3>
    <div id="kingdoms" class="kingdom-list">
        <label class="k-item"><input type="checkbox" id="k1" onchange="save()"> Babilonia (Derrota la soberbia)</label>
        <label class="k-item"><input type="checkbox" id="k2" onchange="save()"> Medo-Persa (Vence la rigidez)</label>
        <label class="k-item"><input type="checkbox" id="k3" onchange="save()"> Grecia (Somete la sabiduría)</label>
        <label class="k-item"><input type="checkbox" id="k4" onchange="save()"> Roma (Domina el ego)</label>
        <label class="k-item"><input type="checkbox" id="k5" onchange="save()"> Asiria (Vence el temor)</label>
    </div>
    
    <h3 style="margin-top:20px;">Diario</h3>
    <textarea id="diary" oninput="save()" placeholder="Tus reflexiones..."></textarea>

    <div id="kingPanel" class="hidden">
        <h3 style="margin-top:20px;">Puntos de mis 15 Guerreros</h3>
        <div id="warriorInputs" class="w-grid"></div>
    </div>

    <button class="btn" style="background:var(--gold)" onclick="sealWeek()">SELLAR SEMANA</button>
    <h2 id="ptsDisplay" style="color:var(--gold); margin-top:20px;">Total: 0 pts</h2>
    <button class="btn" style="background:#475569; color:white;" onclick="location.reload()">CERRAR SESIÓN</button>
</div></div>

<script>
    let state = { name: '', pass: '', role: '', week: 1, maxW: 1 };

    function initApp() {
        state.name = document.getElementById('inName').value;
        state.pass = document.getElementById('inPass').value;
        state.role = document.getElementById('role').value;
        if(!state.name || !state.pass) return alert("Completa los datos");
        
        // Obtener hasta qué semana ha llegado el usuario
        state.maxW = parseInt(localStorage.getItem(`mw_${state.name}_${state.pass}`)) || 1;
        state.week = state.maxW;
        
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('uDisplay').innerText = state.role.toUpperCase() + ": " + state.name;

        if(state.role === 'rey') {
            document.getElementById('kingPanel').classList.remove('hidden');
            let wCont = document.getElementById('warriorInputs');
            wCont.innerHTML = "";
            for(let i=0; i<15; i++) wCont.innerHTML += `<div class="w-block"><div class="w-title">G${i+1}</div><input type="number" placeholder="Pts" id="w${i}" oninput="save()"></div>`;
        }
        loadWeek();
    }

    function changeWeek(d) {
        state.week = Math.max(1, state.week + d);
        loadWeek();
    }

    function save() {
        if(state.week < state.maxW) return; // No guardar si consultamos semana pasada
        let data = {
            t1: document.getElementById('t1').checked, t2: document.getElementById('t2').checked,
            t3: document.getElementById('t3').checked, t4: document.getElementById('t4').checked,
            k1: document.getElementById('k1').checked, k2: document.getElementById('k2').checked,
            k3: document.getElementById('k3').checked, k4: document.getElementById('k4').checked,
            k5: document.getElementById('k5').checked,
            diary: document.getElementById('diary').value,
            warriors: []
        };
        if(state.role === 'rey') {
            for(let i=0; i<15; i++) data.warriors.push(document.getElementById('w'+i).value);
        }
        localStorage.setItem(`cr_${state.name}_${state.pass}_w${state.week}`, JSON.stringify(data));
        calcPoints(data);
    }

    function loadWeek() {
        let raw = localStorage.getItem(`cr_${state.name}_${state.pass}_w${state.week}`);
        let d = raw ? JSON.parse(raw) : {t1:false, t2:false, t3:false, t4:false, k1:false, k2:false, k3:false, k4:false, k5:false, diary:'', warriors:[]};
        
        document.getElementById('weekLabel').innerText = "Semana " + state.week;
        document.getElementById('t1').checked = d.t1; document.getElementById('t2').checked = d.t2;
        document.getElementById('t3').checked = d.t3; document.getElementById('t4').checked = d.t4;
        document.getElementById('k1').checked = d.k1; document.getElementById('k2').checked = d.k2;
        document.getElementById('k3').checked = d.k3; document.getElementById('k4').checked = d.k4;
        document.getElementById('k5').checked = d.k5;
        document.getElementById('diary').value = d.diary;
        if(state.role === 'rey') {
            for(let i=0; i<15; i++) document.getElementById('w'+i).value = d.warriors[i] || '';
        }
        // Bloquear inputs si es una semana pasada
        let isPast = state.week < state.maxW;
        document.querySelectorAll('input, textarea').forEach(i => i.disabled = isPast);
        calcPoints(d);
    }

    function calcPoints(d) {
        let p = (d.t1?5:0) + (d.t2?5:0) + (d.t3?5:0) + (d.t4?5:0) + (d.k1?50:0) + (d.k2?50:0) + (d.k3?50:0) + (d.k4?50:0) + (d.k5?50:0) + Math.min(d.diary.length, 100);
        if(state.role === 'rey') d.warriors.forEach(v => p += parseInt(v || 0));
        document.getElementById('ptsDisplay').innerText = "Total: " + p + " pts";
    }

    function sealWeek() {
        if(!confirm("¿Sellar semana " + state.week + "? Ya no podrás editarla.")) return;
        save();
        state.maxW++;
        localStorage.setItem(`mw_${state.name}_${state.pass}`, state.maxW);
        state.week = state.maxW;
        loadWeek();
    }
</script>
</body>
</html>
