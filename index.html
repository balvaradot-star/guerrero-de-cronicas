<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crónicas | Batalla de Desafíos</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #0f172a; --neon: #22d3ee; --gold: #fbbf24; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f1f5f9; display: flex; justify-content: center; padding: 10px; margin: 0; min-height: 100vh; }
        .app { width: 100%; max-width: 450px; }
        .card { background: var(--card); border: 2px solid var(--neon); padding: 20px; border-radius: 20px; box-shadow: 0 0 15px rgba(34, 211, 238, 0.2); width: 100%; }
        .btn { width: 100%; padding: 14px; background: var(--neon); color: #020617; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-family: 'Cinzel'; text-transform: uppercase; font-size: 1rem; }
        .week-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .mission { display: flex; align-items: center; gap: 10px; margin: 12px 0; font-size: 0.95rem; }
        .kingdom { background: rgba(34, 211, 238, 0.05); padding: 12px; border-radius: 8px; margin: 8px 0; border-left: 3px solid var(--neon); }
        textarea { width: 100%; height: 120px; background: #020617; border: 1px solid var(--neon); border-radius: 8px; color: white; padding: 12px; margin-top: 5px; font-size: 16px; }
        .badge { font-size: 0.75rem; color: var(--gold); display: none; font-weight: bold; }
        .hidden { display: none !important; }
        input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: var(--neon); }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--neon); background: #020617; color: white; font-size: 16px; }
    </style>
</head>
<body>

    <div id="authScreen" class="app">
        <div class="card">
            <h1 style="font-family: 'Cinzel'; font-size: 1.5rem;">CRÓNICAS: UNA BATALLA DE DESAFÍOS</h1>
            <input type="text" id="inName" placeholder="Tu nombre">
            <input type="password" id="inPass" placeholder="Clave secreta">
            <button class="btn" onclick="auth()">INICIAR GESTA</button>
        </div>
    </div>

    <div id="mainApp" class="app hidden">
        <div class="card">
            <h2 id="uNameDisplay" style="color:var(--neon); text-align:center; margin: 0 0 15px 0;">Guerrero</h2>
            
            <div class="week-nav">
                <button class="btn" style="width:auto; margin:0;" onclick="move(-1)">◄</button>
                <h3 id="weekLabel" style="margin:0;">Semana 1</h3>
                <button class="btn" style="width:auto; margin:0;" onclick="move(1)">►</button>
            </div>

            <label class="mission"><input type="checkbox" id="t1" onchange="save()"> Leer Lección (5 pts)</label>
            <label class="mission"><input type="checkbox" id="t2" onchange="save()"> Oración (5 pts)</label>
            <label class="mission"><input type="checkbox" id="t3" onchange="save()"> Compartir Fe (5 pts)</label>
            <label class="mission"><input type="checkbox" id="t4" onchange="save()"> Aprender Verso (5 pts)</label>
            
            <h3 style="color:var(--neon); margin:20px 0 10px 0;">Reinos Conquistados</h3>
            <div id="kingdomsArea"></div>

            <h3 style="color:var(--neon); margin:20px 0 5px 0;">Diario (1pt/palabra)</h3>
            <textarea id="diary" oninput="save()" placeholder="Escribe tus reflexiones..."></textarea>
            
            <button class="btn" style="background:var(--gold); margin-top:20px;" onclick="seal()">SELLAR SEMANA</button>
            <p id="ptsDisplay" style="font-size: 1.8rem; text-align:center; color:var(--gold); margin:20px 0;">Pts: 0</p>
            <button class="btn" style="background:#475569; color:white;" onclick="location.reload()">CERRAR SESIÓN</button>
        </div>
    </div>

    <script>
        const S = localStorage;
        let cw = 1, mw = parseInt(S.getItem('mw')) || 1;
        const kingdoms = ["Babilonia", "Medo-Persa", "Grecia", "Roma", "Asiria", "Nueva Jerusalén"];

        function auth() {
            const n = document.getElementById('inName').value;
            const p = document.getElementById('inPass').value;
            if(n && p.length>=4) { S.setItem('u', n); S.setItem('user_pass', p); enterApp(); }
        }

        function enterApp() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('uNameDisplay').innerText = "Guerrero: " + S.getItem('u');
            
            const kArea = document.getElementById('kingdomsArea');
            kingdoms.forEach((k, i) => {
                kArea.innerHTML += `<div class="kingdom">
                    <label style="display:flex; align-items:center; gap:10px;">
                        <input type="checkbox" id="k${i}" onchange="save()"> <b>${k}</b>
                    </label>
                    <span id="badge${i}" class="badge">★ INSIGNIA</span>
                </div>`;
            });
            refresh();
        }

        function save() {
            const texto = document.getElementById('diary').value.trim();
            const palabras = texto ? texto.split(/\s+/).length : 0;
            const ptsDiario = Math.min(palabras, 100);

            let data = {
                t1: document.getElementById('t1').checked,
                t2: document.getElementById('t2').checked,
                t3: document.getElementById('t3').checked,
                t4: document.getElementById('t4').checked,
                dia: texto,
                k: kingdoms.map((_, i) => document.getElementById('k'+i).checked)
            };
            
            let pts = (data.t1?5:0) + (data.t2?5:0) + (data.t3?5:0) + (data.t4?5:0) + ptsDiario;
            data.k.forEach((checked, i) => {
                if(checked) { pts += 50; document.getElementById('badge'+i).style.display = 'block'; }
                else { document.getElementById('badge'+i).style.display = 'none'; }
            });
            
            S.setItem('w_'+cw, JSON.stringify(data));
            document.getElementById('ptsDisplay').innerText = "Pts: " + pts;
        }

        function move(dir) { cw = Math.max(1, Math.min(mw, cw + dir)); refresh(); }

        function seal() {
            if(confirm("¿Sellar semana " + cw + " y abrir nueva?")) { mw++; S.setItem('mw', mw); cw = mw; refresh(); }
        }

        function refresh() {
            document.getElementById('weekLabel').innerText = "Semana " + cw;
            const d = JSON.parse(S.getItem('w_'+cw)) || {t1:false, t2:false, t3:false, t4:false, dia:"", k:[]};
            document.getElementById('t1').checked = d.t1;
            document.getElementById('t2').checked = d.t2;
            document.getElementById('t3').checked = d.t3;
            document.getElementById('t4').checked = d.t4;
            document.getElementById('diary').value = d.dia || "";
            if(d.k) d.k.forEach((v, i) => { document.getElementById('k'+i).checked = v; });
            save();
        }
    </script>
</body>
</html>
